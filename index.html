<!doctype html>
<html lang="en" class="dark" style="height:100%;max-height:100vh;overflow:hidden">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kirodex</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet" />
        <script>
            // Apply theme before first paint to prevent flash
            (function(){
                var t='dark';try{t=localStorage.getItem('kirodex-theme')||'dark'}catch(e){}
                if(t==='system'){t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}
                if(t==='dark'){document.documentElement.classList.add('dark')}else{document.documentElement.classList.remove('dark')}
                window.__kirodex_resolved_theme=t;
            })();
        </script>
    </head>
    <body>
        <div id="splash" style="
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
            pointer-events: none;
        ">
            <span style="
                font-family: 'JetBrains Mono', monospace;
                font-size: 42px;
                font-weight: 700;
                letter-spacing: 12px;
                color: #7c6aef;
                user-select: none;
                text-shadow:
                    0 0 10px rgba(124, 106, 239, 0.6),
                    0 0 30px rgba(124, 106, 239, 0.4),
                    0 0 60px rgba(124, 106, 239, 0.2);
                animation: glow 2s ease-in-out infinite alternate;
            ">KIRODEX</span>
            <style>
                @keyframes glow {
                    from { text-shadow: 0 0 10px rgba(124,106,239,0.6), 0 0 30px rgba(124,106,239,0.4), 0 0 60px rgba(124,106,239,0.2); }
                    to   { text-shadow: 0 0 15px rgba(124,106,239,0.8), 0 0 40px rgba(124,106,239,0.6), 0 0 80px rgba(124,106,239,0.35), 0 0 120px rgba(124,106,239,0.15); }
                }
            </style>
        </div>
        <div id="root"></div>
        <script type="module" src="/src/renderer/main.tsx"></script>
    </body>
</html>
