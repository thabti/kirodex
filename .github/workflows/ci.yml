name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Lint & Type Check ───────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  # ── UI Tests (multi-platform) ───────────────────────────────────
  test-ui:
    name: UI Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run Vitest
        id: vitest
        shell: bash
        run: |
          bunx vitest run --reporter=verbose 2>&1 | tee vitest-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-output-${{ matrix.os }}
          path: vitest-output.txt

  # ── Rust Tests (multi-platform) ─────────────────────────────────
  test-rust:
    name: Rust Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install gtk4 || true

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo test
        id: cargo_test
        working-directory: src-tauri
        shell: bash
        run: |
          cargo test 2>&1 | tee cargo-test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-output-${{ matrix.os }}
          path: src-tauri/cargo-test-output.txt

  # ── Production Build (macOS) ─────────────────────────────────────
  build:
    name: Production Build (macOS)
    runs-on: macos-latest
    needs: [lint, test-ui, test-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build production app (.app + .dmg)
        run: bun run build

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kirodex.dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kirodex.app
          path: src-tauri/target/release/bundle/macos/*.app

  # ── PR Comment ──────────────────────────────────────────────────
  pr-comment:
    name: PR Test Summary
    runs-on: ubuntu-latest
    needs: [test-ui, test-rust]
    if: github.event_name == 'pull_request' && always()
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-output-*'
        continue-on-error: true

      - name: Post test results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('path');
            const clean = s => s.replace(/\x1b\[[0-9;]*m/g, '').trim();

            const platforms = ['ubuntu-latest', 'macos-latest', 'windows-latest'];
            const rows = [];
            let allPassed = true;

            for (const os of platforms) {
              let vitestOk = '⏭️ Skipped', cargoOk = '⏭️ Skipped';

              try {
                const v = fs.readFileSync(`vitest-output-${os}/vitest-output.txt`, 'utf8');
                vitestOk = v.includes('FAIL') ? '❌ Failed' : '✅ Passed';
                if (v.includes('FAIL')) allPassed = false;
              } catch {}

              try {
                const c = fs.readFileSync(`cargo-test-output-${os}/cargo-test-output.txt`, 'utf8');
                cargoOk = c.includes('FAILED') ? '❌ Failed' : '✅ Passed';
                if (c.includes('FAILED')) allPassed = false;
              } catch {}

              const label = os.replace('-latest', '');
              rows.push(`| ${label} | ${vitestOk} | ${cargoOk} |`);
            }

            const body = [
              `## ${allPassed ? '✅' : '❌'} Test Results`,
              '',
              '| Platform | UI Tests | Rust Tests |',
              '|----------|----------|------------|',
              ...rows,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Test Results')
            );

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
