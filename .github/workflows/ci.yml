name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Step 1: Lint + type check + vite build ─────────────────────
  check:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: TypeScript check
        run: bunx tsc --noEmit
      - name: Vite build
        run: bunx vite build

  # ── Step 2: UI tests (after check passes) ──────────────────────
  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Vitest
        run: bunx vitest run --reporter=verbose

  # ── Step 3: Rust check + tests (after UI tests pass) ───────────
  test-rust:
    name: Rust Check & Tests
    runs-on: ubuntu-latest
    needs: test-ui
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Cargo check
        working-directory: src-tauri
        run: cargo check
      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

  # ── Step 4: PR comment (PRs only) ─────────────────────────────
  pr-comment:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [check, test-ui, test-rust]
    if: github.event_name == 'pull_request' && always()
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const results = {
              'Lint & Build': '${{ needs.check.result }}',
              'UI Tests': '${{ needs.test-ui.result }}',
              'Rust Check & Tests': '${{ needs.test-rust.result }}',
            };
            const allPassed = Object.values(results).every(r => r === 'success');
            const rows = Object.entries(results).map(([name, status]) => {
              const icon = status === 'success' ? '✅' : status === 'skipped' ? '⏭️' : '❌';
              return `| ${name} | ${icon} ${status} |`;
            });

            const body = [
              `## ${allPassed ? '✅' : '❌'} CI Results`,
              '', '| Job | Status |', '|-----|--------|',
              ...rows,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes('CI Results'));
            const params = { owner: context.repo.owner, repo: context.repo.repo, body };

            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
