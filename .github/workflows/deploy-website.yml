name: Deploy Website

on:
  push:
    branches: [main]
    paths: ['website/**']
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: website
        run: bun install --frozen-lockfile

      - name: Build Tailwind CSS
        working-directory: website
        run: bun run build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp website/index.html _site/
          cp website/changelog.html _site/
          cp website/changelog-data.js _site/
          cp website/features.html _site/
          cp -r website/dist _site/
          cp -r website/assets _site/

      - name: Inject base href for GitHub Pages
        run: |
          sed -i 's|<!-- base href injected by CI for GitHub Pages -->|<base href="/kirodex/">|' _site/index.html
          sed -i 's|<!-- base href injected by CI for GitHub Pages -->|<base href="/kirodex/">|' _site/changelog.html
          sed -i 's|<!-- base href injected by CI for GitHub Pages -->|<base href="/kirodex/">|' _site/features.html

      - name: Use production (blue) icon
        run: cp src-tauri/icons/prod/icon.png _site/assets/icon.png

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
